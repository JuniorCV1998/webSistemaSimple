name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Clonar proyecto
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Limpiar instalación previa
        run: |
          rm -rf node_modules
          rm -rf ios
          npm install

      - name: Compilar Angular
        run: npx ng build --configuration production

      - name: Instalar Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Crear iOS limpio
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Forzar iOS deployment target
        run: |
          cd ios/App
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 11.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' project.pbxproj || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 12.0/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' project.pbxproj || true

      - name: Instalar CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App
          rm -rf Pods Podfile.lock
          pod install

      - name: Compilar iOS
        run: |
          xcodebuild \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -archivePath ios/App/App.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO

      - name: Exportar IPA
        run: |
          mkdir -p Payload
          cp -R ios/App/App.xcarchive/Products/Applications/App.app Payload/
          zip -r App.ipa Payload

      - name: Subir IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: App.ipa
