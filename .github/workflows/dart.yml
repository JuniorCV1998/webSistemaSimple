name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install
        run: |
          rm -rf node_modules
          npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Build Angular
        run: npx ng build --configuration production

      # 🔥 CRÍTICO: generar iOS primero
      - name: Create iOS project
        run: |
          rm -rf ios
          npx cap add ios

      # 🔥 PATCH ANTES DEL SYNC (IMPORTANTE)
      - name: Force Podfile iOS 15 BEFORE sync
        run: |
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile || true
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile || true

      # 🔥 AHORA SÍ sync
      - name: Sync iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App
          rm -rf Pods Podfile.lock
          pod install

      - name: Build iOS
        run: |
          xcodebuild \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -archivePath ios/App/App.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p Payload
          cp -R ios/App/App.xcarchive/Products/Applications/App.app Payload/
          zip -r App.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: App.ipa
