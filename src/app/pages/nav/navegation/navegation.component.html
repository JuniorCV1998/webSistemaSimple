<div class="flex flex-column" [ngClass]="{'gap-6': session}">
    <header *ngIf="session && !outSession" style="position: absolute; z-index: 10;">
        <div class="flex flex-row justify-content-between align-items-center p-2">
            <div class="comp_volver">

                <ng-template [ngIf]="showVolverButton">
                    <a (click)="volver()"><i id="volver-icon" class="pi pi-angle-left"></i></a>
                </ng-template>
                <ng-template [ngIf]="!showVolverButton">
                    <a *ngIf="!showAux"><i id="volver-icon" (click)="visible = true"
                            class="pi pi-bars icon-span"></i></a>
                </ng-template>

            </div>
            <img [src]="pathLogo" alt="Logo" height="55" class="rounded-lg shadow-sm border border-gray-200"
                style="object-fit: contain; background-color: #fff; padding: 4px;">


        </div>
    </header>

    <div [ngStyle]="{ 
        'margin-top.px': (!outSession && session) ? 50 : 0 
        }" style="position: relative; min-height: 100%;">
        <div [@routeAnimations]="prepareRoute(outlet)" style="position: absolute; width: 100%; top: 0; left: 0;">
            <router-outlet #outlet="outlet" style="padding-top: 1rem;"></router-outlet>
        </div>
    </div>

</div>


<p-drawer #drawerRef [(visible)]="visible">
