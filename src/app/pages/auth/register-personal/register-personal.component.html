
<div>
    <!-- <div class="surface-card p-4 shadow-2 border-round w-full lg:w-12"> -->
    <div class="surface-card p-0 shadow-0 border-round w-full lg:w-12">
        <div class="comp_volver">
            <!-- <a href="/registrar"><i id="volver-icon" class="pi pi-angle-left"></i><p>Volver</p></a> -->
            <a (click)="volver()"><i id="volver-icon" class="pi pi-angle-left"></i><p>Volver</p></a>
        </div>
        <div class="text-center mb-5">
            <img src="assets/images/logos/logo_ssimple.png" alt="Image" height="200" style="margin-bottom: 0;" class="mb-0">
            <div id="div_line_bootom" class="text-700 text-2xl font-medium mb-3">¡Estamos en la recta final!</div>
        </div>

        <div>
            <label for="nombres" class="block text-900 font-medium mb-2">Nombres</label>
            <input id="nombres" [(ngModel)]="objPersona.nombres" [maxlength]="25" type="text" autocomplete="off" placeholder="Nombres" pInputText appSoloLetras class="w-full mb-3">

            <div class="flex flex-row gap-2 align-items-center justify-content-center">
                <div class="flex flex-column w-full">
                    <label for="apellidop" class="block text-900 font-medium mb-2">Apellido paterno</label>
                    <input id="apellidop" [(ngModel)]="objPersona.apellidoPaterno" [maxlength]="20" type="text" autocomplete="off" placeholder="Apellido paterno" pInputText appSoloLetras class="w-full mb-3">
                </div>

                <div class="flex flex-column w-full">
                    <label for="apellidom" class="block text-900 font-medium mb-2">Apellido materno</label>
                    <input id="apellidom" [(ngModel)]="objPersona.apellidoMaterno" [maxlength]="20" type="text" autocomplete="off" placeholder="Apellido materno" pInputText appSoloLetras class="w-full mb-3">
                </div>
            </div>

            <div class="flex flex-row gap-2 align-items-center justify-content-center">
                <div class="flex flex-column w-full">
                    <label for="celular" class="block text-900 font-medium mb-2">Celular</label>
                    <input id="celular" [(ngModel)]="objPersona.celular" type="text" placeholder="Celular" autocomplete="off" pInputText appNroCelular class="w-full mb-3">
                </div>

                <div class="flex flex-column w-full">
                    <label for="direccion" class="block text-900 font-medium mb-2">Dirección</label>
                    <input id="direccion" [(ngModel)]="objPersona.direccion" [maxlength]="60" type="text" autocomplete="off" placeholder="Dirección" pInputText class="w-full mb-3">
                </div>
            </div>

<!--             <div class="card flex justify-content-center">
                
                <p-card>
                    <i id="i_image" class="pi pi-image"></i>
                    <div class="flex flex-column w-9">
                        <p id="p_body" class="m-0"><i id="i_info" class="pi pi-info-circle"></i> Puedes añadir o editar una imagen de tu negocio para que los clientes lo visualicen después de iniciar sesión en la aplicación.</p>
                        <p id="p_pie" class="w-full">Inicio > Mi cuenta > Imagen de Inversor.</p>
                    </div>
                    
                </p-card>
            </div> -->
            <br>

            <button [ngClass]="{
                'btn-disabled': !isFormValid()
              }"
            pButton pRipple label="Registrarme" (click)="registrarInversor()" [disabled]="!isFormValid()" class="w-full"></button>
        </div>
    </div>
    <p-confirmDialog #cd>
        <ng-template pTemplate="headless" let-message>
            <div class="flex flex-column align-items-center p-5 surface-overlay border-round">
                <div *ngIf="!confirmCase" class="border-circle bg-primary inline-flex justify-content-center align-items-center h-5rem w-5rem">
                    <img src="assets/images/logos/sello_ssimple.png" width="100" height="100">
                </div>
                <span class="font-bold text-2xl block mb-2 mt-4">
                    {{ message.header }}
                </span>
                <p class="mb-3">{{ message.message }}</p>
                <div *ngIf="!confirmCase" class="flex flex-column w-full align-items-left confirm-date">
                    <div class="flex flex-row gap-2 p-3 align-items-center">
                        <span>Correo:</span>
                        <span style="color: var(--blue-500);">{{ correo }}</span>
                    </div>
                </div>
                <div *ngIf="confirmCase" class="flex flex-column w-full align-items-left confirm-date">
                    <div class="flex flex-row gap-2 p-3 align-items-center">
                        <i class="pi pi-user"></i>
                        <span>{{ objPersona.nombres+" "+objPersona.apellidoPaterno+" "+objPersona.apellidoMaterno}}</span>
                    </div>
                    <div class="flex flex-row gap-2 p-3 align-items-center">
                        <i class="pi pi-at"></i>
                        <span>{{ correo }}</span>
                    </div>
                    <div class="flex flex-row gap-2 p-3 align-items-center">
                        <i class="pi pi-phone"></i>
                        <span>{{ objPersona.celular }}</span>
                    </div>
                    <div class="flex flex-row gap-2 p-3 align-items-center">
                        <i class="pi pi-map-marker"></i>
                        <span>{{ objPersona.direccion }}</span>
                    </div>
                </div>

                <div *ngIf="confirmCase" class="flex align-items-center gap-2 mt-4">
                    <button 
                        pButton 
                        label="Cancelar" 
                        (click)="cd.reject()" 
                        class="p-button-outlined w-8rem ">
                    </button>
                    <button 
                        pButton 
                        label="Confirmar" 
                        (click)="cd.accept()" 
                        class="w-8rem">
                    </button>
                </div>
                <div *ngIf="!confirmCase" class="flex align-items-center gap-2 mt-4">
                    <button 
                        pButton 
                        label="Aceptar" 
                        (click)="cd.accept()" 
                        class="w-8rem">
                    </button>
                </div>
            </div>
        </ng-template>
    </p-confirmDialog>
    <app-loading></app-loading>
</div>
