
<div>
    <!-- <div class="surface-card p-4 shadow-2 border-round w-full lg:w-12"> -->
    <div class="surface-card p-2 shadow-0 border-round w-full lg:w-12">
        <div class="text-center mb-5">
            <img src="assets/images/logos/logo_ssimple.png" alt="Image" height="150" style="margin-bottom: 0;" class="mb-0">
            <div id="div_line_bootom" class="text-700 text-2xl font-medium mb-3">¡Qué alegría verte otra vez!</div>
            <span class="text-600 font-medium line-height-3">¿No tienes una cuenta?</span>
            <a class="font-medium no-underline ml-2 text-blue-400 cursor-pointer" (click)="creaHoy()">¡Crea hoy!</a>
        </div>

        <div>
            <form #form="ngForm" (ngSubmit)="login(form)">
                <label for="email1" class="block text-900 font-medium mb-2">Correo electrónico</label>
                <input id="email1" name="usuario" [(ngModel)]="credenciales.correo" type="text" placeholder="Dirección de correo electrónico" pInputText class="w-full mb-3">

                <label for="password1" class="block text-900 font-medium mb-2">Contraseña</label>
                <div class="relative w-full mb-3">
                    <input id="password1" name="contrasena" [(ngModel)]="credenciales.contrasena" [type]="passwordFieldType" placeholder="Contraseña" pInputText class="w-full">
                    
                    <!-- Icono de ojo -->
                    <i class="pi" [ngClass]="passwordFieldType === 'password' ? 'pi-eye' : 'pi-eye-slash'" 
                      (click)="togglePasswordVisibility()" 
                      style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); cursor: pointer;">
                    </i>
                </div>
                
                <div class="flex align-items-center justify-content-center mb-6"> <!-- between: cuando acompaña el rememberme -->
                    <!-- <div class="flex align-items-center">
                        <p-checkbox id="rememberme" [binary]="true" styleClass="mr-2"></p-checkbox>
                        <label for="rememberme1">Acuérdate de mí</label>
                    </div> -->
                    <!-- <a class="font-medium no-underline ml-2 text-blue-400 text-right cursor-pointer">¿Has olvidado tu contraseña?</a> -->
                </div>

                <button pButton pButton [ngClass]="{
                    'btn-disabled': !isFormValid() }"
                    pRipple label="Iniciar sesión" [disabled]="!isFormValid()"
                    icon="pi pi-sign-in" class="w-full"></button>

        </form>
        </div>
    </div>
    <app-loading></app-loading>
</div>
