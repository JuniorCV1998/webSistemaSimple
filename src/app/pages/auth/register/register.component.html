
<div>
    <!-- <div class="surface-card p-4 shadow-2 border-round w-full lg:w-12"> -->
    <div class="surface-card p-0 shadow-0 border-round w-full lg:w-12">
        <div class="comp_volver">
            <!-- <a href="/login"><i id="volver-icon" class="pi pi-angle-left"></i><p>Volver</p></a> -->
            <a (click)="volver()"><i id="volver-icon" class="pi pi-angle-left"></i><p>Volver</p></a>
        </div>
        <div class="text-center mb-5">
            <img src="assets/images/logos/logo_ssimple.png" alt="Image" height="200" style="margin-bottom: 0;" class="mb-0">
            <div id="div_line_bootom" class="text-700 text-2xl font-medium mb-3">Únete a nosotros</div>
        </div>

        <div>
            <label for="email1" class="block text-900 font-medium mb-2">Correo electrónico</label>
            <input [(ngModel)]="objUser.correo" id="email1" aria-describedby="email-help" type="text" autocomplete="off" (focus)="onFocus(1)" (blur)="onBlur(1)" placeholder="Dirección de correo electrónico" pInputText class="w-full mb-3">
            <small *ngIf="isWriting" id="email-help"><br><i class="pi pi-info-circle"></i> Recuerda que este correo será usado para enviarte información respecto a tu cuenta.<br><br></small>

            <label for="password1" class="block text-900 font-medium mb-2">Contraseña</label>
            <div class="relative w-full mb-3">
                <input [(ngModel)]="objUser.contrasena" id="password1" aria-describedby="pass-help" [maxlength]="6" appSoloNumeros
                (ngModelChange)="isValidPassword = validarContrasena(objUser.contrasena.trim())"
                [type]="passwordFieldType" placeholder="Contraseña" (focus)="onFocus(2)" (blur)="onBlur(2)" 
                pInputText class="w-full">
                <!-- Icono de ojo -->
                <i id="iconPassword1" class="pi" [ngClass]="passwordFieldType === 'password' ? 'pi-eye' : 'pi-eye-slash'" 
                (click)="togglePasswordVisibility(1)" 
                style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); cursor: pointer;">
                </i>
            </div>
            <small *ngIf="isWritingP || (!isValidPassword && objUser?.contrasena?.length > 0)"
                [style.color]="!isValidPassword && objUser?.contrasena?.length > 0 ? 'red' : 'inherit'"
                 id="pass-help"><i class="pi pi-info-circle"></i> Debe contener exactamente 6 caracteres numéricos.<br><br></small>

            <!-- <p-password formControlName="value" [feedback]="true" [toggleMask]="true"/> -->
            <label for="password2" class="block text-900 font-medium mb-2">Confirmar contraseña</label>
            <div class="relative w-full mb-3">
                <input [(ngModel)]="objUser.contrasena2" id="password2" [type]="passwordFieldType2" [maxlength]="6" appSoloNumeros
                 placeholder="Confirmar contraseña" pInputText class="w-full">
                <!-- Icono de ojo -->
                <i id="iconPassword1" class="pi" [ngClass]="passwordFieldType2 === 'password' ? 'pi-eye' : 'pi-eye-slash'" 
                (click)="togglePasswordVisibility(2)" 
                style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); cursor: pointer;">
                </i>
            </div>

            <label ngClass="labelCodUnico" for="codUnico" class="block text-900 font-medium mb-2"><b>Código Único</b></label>
            <p-inputOtp [(ngModel)]="codigoUnico" [integerOnly]="true" [length]="6" class="w-full mb-2" (input)="onInputChange()"/>
            <small
            [ngClass]="{
                'labelCodUnico': codigoUnico.length == 6
              }"
            class="codUnico-help">SS - {{valueShow}}</small>

            <br><br><br>
            <!-- <div class="flex align-items-center justify-content-center mb-6">
                <div class="flex align-items-center">
                    <p-checkbox id="rememberme" [binary]="true" styleClass="mr-2"></p-checkbox>
                    <label for="rememberme1">Acuérdate de mí</label>
                </div>
                <p-checkbox value="terminos" inputId="ny"/>
                <label id="terminos_condiciones">He leído y acepto los <a class="terminos_condiciones">términos y condiciones de uso.</a></label>
            </div> -->

            <button [ngClass]="{
                'btn-disabled': !isFormValid()
              }"
             pButton pRipple label="Continuar" (click)="validarDatos()" [disabled]="!isFormValid()" iconPos="right" icon="pi pi-angle-right" class="w-full"></button>
        </div>
    </div>
    <app-loading></app-loading>
</div>
